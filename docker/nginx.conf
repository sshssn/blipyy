# When Blipyy sits behind an outer reverse proxy (NPM/Caddy/Traefik) that
# already set X-Forwarded-Proto, preserve it; otherwise report this hop's
# scheme. Overwriting it with $scheme made the backend think HTTPS deployments
# were plain HTTP, which broke auth cookie attributes (issue #347).
map $http_x_forwarded_proto $blipyy_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# Identify social link-preview crawlers so individual trade pages can serve a
# per-trade Open Graph card. Humans fall through to the SPA as normal.
map $http_user_agent $blipyy_is_bot {
    default 0;
    "~*(Twitterbot|facebookexternalhit|Facebot|LinkedInBot|Slackbot|Discordbot|TelegramBot|WhatsApp|Pinterest|redditbot|Embedly|Iframely|Mastodon|skypeuripreview|vkShare|Google-PageRenderer)" 1;
}

# Redirect www to non-www
server {
    listen 80;
    server_name www.blipyy.io;
    return 301 https://blipyy.io$request_uri;
}

server {
    listen 80 default_server;
    server_name blipyy.io localhost _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    client_max_body_size 150M;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # OWASP Security Headers for frontend HTML pages
    # Content Security Policy (CSP) - CWE-693 mitigation
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://s3.tradingview.com https://cdn.jsdelivr.net https://unpkg.com https://cdn.promotekit.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://api.finnhub.io https://www.alphavantage.co https://generativelanguage.googleapis.com https://promotekit.com; frame-src 'none'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Anti-clickjacking protection - CWE-1021 mitigation
    add_header X-Frame-Options "DENY" always;

    # Additional security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), fullscreen=(), display-capture=()" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Deny hidden/sensitive dotfiles (.env, .git, etc.) with a real 404 instead
    # of letting them fall through to the SPA index.html catch-all below.
    # Excludes /.well-known/ which is legitimately proxied to the backend.
    location ~ /\.(?!well-known/) {
        return 404;
    }

    # Individual trade pages: crawlers get the server-rendered Open Graph card so
    # shared links unfurl; humans get the SPA. The regex only matches /trades/<id>,
    # not the trades list or sub-routes.
    location ~ ^/trades/[0-9a-fA-F-]+$ {
        if ($blipyy_is_bot) {
            rewrite ^(/trades/[0-9a-fA-F-]+)$ /og$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Open Graph endpoints (per-trade card HTML + image) proxied to the backend.
    location /og/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $blipyy_forwarded_proto;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite-hashed assets (1 year, immutable)
    # Use regex to avoid trailing-slash redirect on /assets (ZAP: Big Redirect)
    location ~ ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Security headers must be repeated in location blocks (nginx inheritance quirk)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://s3.tradingview.com https://cdn.jsdelivr.net https://unpkg.com https://cdn.promotekit.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://api.finnhub.io https://www.alphavantage.co https://generativelanguage.googleapis.com https://promotekit.com; frame-src 'none'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), fullscreen=(), display-capture=()" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
    }

    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $blipyy_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    # OAuth2 POST endpoints (token, revoke) - proxy directly to backend
    # These are server-to-server calls from external OAuth clients
    location ~ ^/oauth/(token|revoke|userinfo)$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $blipyy_forwarded_proto;
        proxy_set_header Content-Type $content_type;
    }

    location /.well-known/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $blipyy_forwarded_proto;
    }
}
