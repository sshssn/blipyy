version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blipyy-db
    environment:
      POSTGRES_USER: ${DB_USER:-trader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-blipyy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blipyy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trader} -d ${DB_NAME:-blipyy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: blipyy-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-trader}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:-blipyy}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      INSTANCE_NAME: ${INSTANCE_NAME:-Blipyy}
      INSTANCE_URL: ${INSTANCE_URL:-}
      APP_URL: ${APP_URL:-}
      BASE_URL: ${BASE_URL:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
      REGISTRATION_MODE: ${REGISTRATION_MODE:-open}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-UTC}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DISABLE_BACKGROUND_JOBS: ${DISABLE_BACKGROUND_JOBS:-false}
      BILLING_ENABLED: ${BILLING_ENABLED:-false}
      FEATURES_BILLING_ENABLED: ${FEATURES_BILLING_ENABLED:-false}
    ports:
      - "8080:80"
    volumes:
      - ./backend/src/logs:/app/backend/src/logs
      - ./backend/src/data:/app/backend/src/data
      - ./backend/uploads:/app/backend/uploads
    networks:
      - blipyy-network
    restart: unless-stopped

networks:
  blipyy-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
