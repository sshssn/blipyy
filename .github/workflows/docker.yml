name: Build Docker Images

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - fix/pnl-canonical-engine
    tags:
      - 'v*.*.*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and publish, for example v2.5.0
        required: true
        type: string
      prerelease:
        description: Publish this manual build as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref || github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: blipyy
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: blipyy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out manually selected release tag
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Check out release tag
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Check out branch
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm --dir backend test

      - name: Run backend integration tests (real Postgres)
        run: pnpm --dir backend test:integration
        env:
          TEST_DATABASE_URL: postgres://blipyy:testpass@localhost:5432/blipyy_test

      - name: Run frontend tests
        run: pnpm --dir frontend test:run

  build:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out manually selected release tag
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Check out release tag
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Check out branch
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine tags
        id: tags
        run: |
          build_release_tags() {
            local release_tag="$1"
            local is_prerelease="$2"

            if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tag must match vX.Y.Z, got: $release_tag"
              exit 1
            fi

            local version="${release_tag#v}"
            local major_minor="${version%.*}"
            local major="${version%%.*}"
            local tags="potentialmidas/blipyy:${version},potentialmidas/blipyy:${major_minor},potentialmidas/blipyy:${major}"

            if [[ "$is_prerelease" == "true" ]]; then
              tags="${tags},potentialmidas/blipyy:nightly"
            else
              tags="${tags},potentialmidas/blipyy:latest"
            fi

            echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          }

          if [[ "${{ github.event_name }}" == "release" ]]; then
            build_release_tags "${{ github.event.release.tag_name }}" "${{ github.event.release.prerelease }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            build_release_tags "${{ inputs.release_tag }}" "${{ inputs.prerelease }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            build_release_tags "${{ github.ref_name }}" "false"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tags=potentialmidas/blipyy:latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "tags=potentialmidas/blipyy:nightly" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/fix/pnl-canonical-engine" ]]; then
            echo "tags=potentialmidas/blipyy:pnl-engine" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported ref: ${{ github.ref }}"
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  android-apk:
    # Attach the prebuilt Android APK to the release. Kept as its own job so a
    # Docker build/push failure can't block the asset upload, and so it can be
    # run manually (workflow_dispatch) to attach the APK when a release event
    # didn't fire or the asset is missing.
    needs: test
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out manually selected release tag
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Check out release tag
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Resolve release tag
        id: rel
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify APK is present
        run: |
          apk="release-assets/android/blipyy-android.apk"
          if [[ ! -f "$apk" ]]; then
            echo "::error::Android APK not found at $apk for ${{ steps.rel.outputs.tag }}. Build and commit the APK before releasing."
            exit 1
          fi
          ls -lh "$apk"

      - name: Upload Android APK release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.rel.outputs.tag }}" \
            release-assets/android/blipyy-android.apk#Blipyy-Android-${{ steps.rel.outputs.tag }}.apk \
            --clobber
